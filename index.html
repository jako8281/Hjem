<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dagens Opgaver af JBS</title>
  <style>
    :root {
      --accent: #0f766e;
      --ink: #0a0a0a;
      --muted: #525252;
      --bg: #f3f4f6; /* lys grå */
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      line-height: 1.4;
      text-align: center;            /* centrer al tekst */
    }
    header {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 16px 12px;
    }
    h1 {
      font-size: 22px;
      margin: 0;
      font-weight: 700;
    }
    main { padding: 16px; max-width: 900px; margin: 0 auto; }
    ol { 
      padding-left: 0;               /* fjern indrykning */
      list-style-position: inside;   /* numre indenfor, så det kan centreres pænt */
      margin: 0 auto;
    }
    li { 
      margin: 10px 0 16px; 
    }

    /* Udskriftsvenlighed */
    @media print {
      header { display: none !important; }
      body { color: #000; background: #fff; }
      li { break-inside: avoid; page-break-inside: avoid; margin-bottom: 14px; }
      main { padding: 0; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Dagens Opgaver af JBS</h1>
  </header>

  <main>
    <ol id="opgaveliste"></ol>
  </main>

  <script>
    // --- Hjælpefunktioner: seedet tilfældighed så opgaverne ændrer sig hver dag ---
    function pad2(n){ return String(n).padStart(2, '0'); }
    function localISODate(d){
      const y = d.getFullYear();
      const m = pad2(d.getMonth()+1);
      const day = pad2(d.getDate());
      return `${y}-${m}-${day}`; // Lokal dato (YYYY-MM-DD)
    }

    // xfnv1a + sfc32 for deterministisk RNG baseret på dato
    function xfnv1a(str){
      for(var i=0,h=2166136261>>>0;i<str.length;i++){
        h = Math.imul(h ^ str.charCodeAt(i), 16777619);
      }
      return function(){
        h += h<<1; h ^= h>>>1; h += h<<3; h ^= h>>>7; h += h<<15; // ekstra blanding
        return h>>>0;
      }
    }
    function sfc32(a,b,c,d){
      return function(){
        a>>>0; b>>>0; c>>>0; d>>>0; 
        var t = (a + b) | 0; t = (t + d) | 0; d = (d + 1) | 0;
        a = b ^ (b >>> 9);
        b = (c + (c << 3)) | 0;
        c = (c << 21) | (c >>> 11);
        c = (c + t) | 0;
        return (t >>> 0) / 4294967296;
      }
    }
    function makeRNG(seedStr){
      const h = xfnv1a(seedStr);
      return sfc32(h(), h(), h(), h());
    }

    // --- Tilfældige værktøjer ---
    function randint(rng, min, max){ // inkl. begge ender
      return Math.floor(rng() * (max - min + 1)) + min;
    }
    function choice(rng, arr){ return arr[Math.floor(rng()*arr.length)]; }
    function shuffle(rng, arr){
      for(let i=arr.length-1;i>0;i--){
        const j = Math.floor(rng()*(i+1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    function gcd(a,b){ while(b){ [a,b] = [b, a%b]; } return Math.abs(a); }

    // --- Opgavegeneratorer (tekst på dansk) ---
    const gens = {
      addition(rng){
        const a = randint(rng, 100, 999);
        const b = randint(rng, 100, 999);
        return `${a} + ${b} = ____`;
      },
      subtraction(rng){
        let a = randint(rng, 200, 999);
        let b = randint(rng, 50, a-10);
        return `${a} − ${b} = ____`;
      },
      multiplication(rng){
        const a = randint(rng, 12, 99);
        const b = randint(rng, 2, 12);
        return `${a} × ${b} = ____`;
      },
      division(rng){
        const b = randint(rng, 2, 12);
        const q = randint(rng, 2, 99);
        const a = b * q;
        return `${a} ÷ ${b} = ____`;
      },
      fraction_simplify(rng){
        const base = randint(rng, 2, 12);
        const n = base * randint(rng, 2, 9);
        const d = base * randint(rng, 2, 9);
        return `Forkort brøken: ${n}/${d}`;
      },
      fraction_of_number(rng){
        const denom = choice(rng, [2,3,4,5,6,8,10]);
        const numer = randint(rng, 1, denom-1);
        const whole = choice(rng, [24, 30, 36, 40, 48, 54, 60, 72]);
        return `Hvor meget er ${numer}/${denom} af ${whole}?`;
      },
      fraction_compare(rng){
        let a = randint(rng, 1, 9), b = randint(rng, 2, 10);
        let c = randint(rng, 1, 9), d = randint(rng, 2, 10);
        if(a>=b) a = b-1; if(c>=d) c = d-1;
        return `Sæt >, < eller = : ${a}/${b} __ ${c}/${d}`;
      },
      area_rectangle(rng){
        const L = randint(rng, 4, 25);
        const B = randint(rng, 3, 20);
        return `Rektangel: L = ${L} cm, B = ${B} cm. Areal = ____ cm²`;
      },
      perimeter_rectangle(rng){
        const L = randint(rng, 5, 30);
        const B = randint(rng, 3, 25);
        return `Rektangel: L = ${L} cm, B = ${B} cm. Omkreds = ____ cm`;
      },
      number_pattern(rng){
        const start = randint(rng, 1, 20);
        const step = choice(rng, [2,3,4,5,6,7,8,9,10]);
        return `Fortsæt talrækken (${step} pr. skridt): ${start}, ${start+step}, ${start+2*step}, ${start+3*step}, __, __`;
      },
      time_convert(rng){
        const h = randint(rng, 1, 4);
        const m = choice(rng, [5,10,15,20,25,30,35,40,45,50,55]);
        return `Hvor mange minutter er der i ${h} timer og ${m} minutter?`;
      },
      equation_solve(rng){
        // x + a = b eller a × x = b (heltal)
        if(rng() < 0.5){
          const a = randint(rng, 5, 80);
          const x = randint(rng, 3, 40);
          const b = a + x;
          return `Løs: x + ${a} = ${b}  →  x = ____`;
        } else {
          const a = randint(rng, 2, 12);
          const x = randint(rng, 2, 12);
          const b = a * x;
          return `Løs: ${a} · x = ${b}  →  x = ____`;
        }
      },
      word_problem(rng){
        const type = randint(rng, 1, 3);
        if(type === 1){
          const pris = choice(rng, [5,10,12,15,20,25]);
          const stk = randint(rng, 3, 12);
          return `En bog koster ${pris} kr. Hvor meget koster ${stk} bøger i alt?`;
        } else if(type === 2){
          const total = randint(rng, 200, 600);
          const brugt = randint(rng, 50, total-50);
          return `En klasse samlede ${total} kr. ind. De brugte ${brugt} kr. Hvor mange kroner er der tilbage?`;
        } else {
          const hast = choice(rng, [3,4,5,6]);
          const tid = randint(rng, 10, 25);
          return `En elev løber ${hast} km/t. Hvor langt løber eleven på ${tid} minutter? (svar i km)`;
        }
      }
    };

    function lavOpgaver(rng){
      // Fordeling for at sikre blanding (25 i alt)
      const plan = [
        'addition','subtraction','multiplication','division',
        'fraction_simplify','fraction_of_number','fraction_compare',
        'area_rectangle','perimeter_rectangle','number_pattern',
        'time_convert','equation_solve','word_problem'
      ];
      // Start med hver type mindst én gang hvor det giver mening
      const opgaver = [];
      const mindstEn = ['addition','subtraction','multiplication','division','fraction_simplify','area_rectangle','perimeter_rectangle','number_pattern','equation_solve'];
      mindstEn.forEach(t => opgaver.push(gens[t](rng)));

      // Fyld op til 25 med tilfældige typer fra plan
      while(opgaver.length < 25){
        const t = choice(rng, plan);
        opgaver.push(gens[t](rng));
      }
      return opgaver;
    }

    function render(){
      const nu = new Date();
      const datoStr = localISODate(nu);

      const rng = makeRNG('math-'+datoStr);
      const liste = document.getElementById('opgaveliste');
      liste.innerHTML = '';

      const opgaver = lavOpgaver(rng);
      // Let blanding
      shuffle(rng, opgaver);

      opgaver.forEach((txt) => {
        const li = document.createElement('li');
        li.textContent = txt;
        liste.appendChild(li);
      });
    }

    render();
  </script>
</body>
</html>
